name: Publish

on:
  workflow_dispatch:

#on:
#  push:
#    branches:
#      - main
#    paths:
#      - '**/package.json'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for npm trusted publishing (OIDC)
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Print Environment Info
        run: bun nx report

      - name: Override package manager for trusted publishing
        run: node -e "const fs=require('fs'),p='nx.json',c=JSON.parse(fs.readFileSync(p));c.cli={packageManager:'npm'};fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n')"

      - name: Publish packages
        run: npx nx release publish
